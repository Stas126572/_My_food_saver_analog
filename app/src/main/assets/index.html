<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wasm Counter Android</title>
    <style>
        /* Стили для мобильного интерфейса */
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }

        h1 {
            color: #212529;
            margin-bottom: 10px;
        }

        #counterValue {
            font-size: 80px;
            font-weight: bold;
            color: #007bff;
            margin: 20px 0;
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            active: transform: scale(0.98);
        }

        .status {
            margin-top: 30px;
            font-size: 12px;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <h1>C + WebAssembly</h1>
    
    <!-- Сюда будет выводиться значение из Си -->
    <div id="counterValue">0</div>

    <!-- Кнопка вызывает JS функцию, которая дергает Wasm -->
    <button class="btn" onclick="handleIncrement()">Увеличить счетчик</button>

    <div class="status" id="statusInfo">Загрузка WASM...</div>

    <!-- 
      ПОРЯДОК СКРИПТОВ:
      1. Сначала загружаем 'клей', созданный emcc (my_code.js)
      2. Потом наш управляющий index.js
    -->
    <script src="my_code.js"></script>
    <script src="index.js"></script>

    <script>
        // Небольшой лог для отладки прямо на экране телефона
        window.onerror = function(msg, url, line) {
            document.getElementById('statusInfo').innerText = "Ошибка: " + msg;
            return false;
        };
    </script>
</body>
</html>
